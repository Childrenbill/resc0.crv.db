/* ===== SISTEMA DE TEMAS (claro/oscuro estilo MAX) ===== */
:root {
  /* Acentos MAX (teal) */
  --teal: #4ecdc4;
  --teal-dark: #3aa89f;
  --teal-soft: rgba(78, 205, 196, 0.12);
  --nov-red: #c8102e;
  --nov-red-soft: rgba(200, 16, 46, 0.1);
  --wsp-green: #25d366;
  --wsp-green-dark: #1da851;
  --mail-blue: #0078d4;
  --gold: #f5b942;
}

/* MODO CLARO */
:root, [data-theme="light"] {
  --bg: #f4f5f7;
  --bg-card: #ffffff;
  --bg-soft: #fafbfc;
  --bg-muted: #eef0f3;
  --bg-elev: #ffffff;
  --border: #e2e6ec;
  --border-strong: #cbd2dc;
  --text: #1a1f29;
  --text-dim: #4b5563;
  --text-faint: #8a93a3;
  --accent: var(--nov-red);
  --accent-soft: var(--nov-red-soft);
  --shadow: 0 4px 16px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --wave: rgba(0,0,0,0.025);
  --header-grad: linear-gradient(135deg, #c8102e, #8b1828);
  --wm-opacity: 0.05;
  --preview-bg: #eafaf1;
  --preview-label: #1da851;
  --preview-text: #1a1f29;
}

/* MODO OSCURO (estilo MAX) */
[data-theme="dark"] {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-soft: #1c222b;
  --bg-muted: #21262d;
  --bg-elev: #1c222b;
  --border: #2a3038;
  --border-strong: #3a424d;
  --text: #e8eef7;
  --text-dim: #9aa7b8;
  --text-faint: #6b7888;
  --accent: var(--teal);
  --accent-soft: var(--teal-soft);
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --wave: rgba(255,255,255,0.018);
  --header-grad: linear-gradient(135deg, #1a2832, #0d1117);
  --wm-opacity: 0.04;
  --preview-bg: rgba(37,211,102,0.08);
  --preview-label: #4ade80;
  --preview-text: #e8eef7;
}

/* AUTO: sigue el tema del sistema */
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-soft: #1c222b;
    --bg-muted: #21262d;
    --bg-elev: #1c222b;
    --border: #2a3038;
    --border-strong: #3a424d;
    --text: #e8eef7;
    --text-dim: #9aa7b8;
    --text-faint: #6b7888;
    --accent: var(--teal);
    --accent-soft: var(--teal-soft);
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --wave: rgba(255,255,255,0.018);
    --header-grad: linear-gradient(135deg, #1a2832, #0d1117);
    --wm-opacity: 0.04;
    --preview-bg: rgba(37,211,102,0.08);
    --preview-label: #4ade80;
    --preview-text: #e8eef7;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 15px; line-height: 1.5; min-height: 100vh;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}
/* Patrón de ondas sutil de fondo (estilo MAX) */
body {
  padding: 0 0 90px 0;
  background-image: repeating-linear-gradient(45deg, var(--wave) 0 2px, transparent 2px 22px);
}

  background-position: center;

  pointer-events: none;
  z-index: 0;
}
.app { position: relative; z-index: 1; }
.app { max-width: 720px; margin: 0 auto; padding: 16px; }

/* ===== HEADER ===== */
header.top {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  background-image: linear-gradient(180deg, var(--bg) 0%, var(--bg) 82%, transparent 100%);
  padding: 14px 16px 12px; margin: 0 -16px 14px;
}
.brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.brand .logo {
  width: 42px; height: 42px; border-radius: 11px;
  background-image: url('icon-192.png');
  background-size: cover; background-position: center;
  box-shadow: var(--shadow); flex-shrink: 0;
}
.brand-txt { flex: 1; min-width: 0; }
.brand h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
.brand .sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.theme-toggle {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--bg-card); border: 1px solid var(--border);
  cursor: pointer; display: grid; place-items: center;
  color: var(--text-dim); flex-shrink: 0;
  transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

.search-wrap { position: relative; }
.search {
  width: 100%; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 13px;
  padding: 14px 44px 14px 44px;
  color: var(--text); font-family: inherit; font-size: 15px;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow);
}
.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search::placeholder { color: var(--text-faint); }
.search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
.clear-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: transparent; border: none; color: var(--text-faint);
  width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
}
.clear-btn:hover { background: var(--bg-muted); color: var(--text); }
.search.has-value ~ .clear-btn { display: flex; }

.tabs {
  display: flex; gap: 4px; margin: 12px 0 4px;
  background: var(--bg-muted); border: 1px solid var(--border);
  border-radius: 12px; padding: 4px;
}
.tab {
  flex: 1; background: transparent; border: none; color: var(--text-dim);
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 10px 6px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 4px;
  white-space: nowrap;
}
.tab.active { background: var(--bg-card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
.tab .badge {
  background: var(--accent-soft); color: var(--accent);
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center;
}

/* ===== STEP CARDS (wizard) ===== */
.step {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.step-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.step-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); color: var(--bg-card);
  display: grid; place-items: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}
.step-num.done { background: var(--wsp-green); }
.step-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
.step-value {
  font-size: 12px; font-weight: 600; color: var(--accent);
  max-width: 45%; text-align: right;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.step-body { padding: 16px; }
.step-collapsed .step-body { display: none; }
.step-collapsed .step-head { border-bottom: none; cursor: pointer; }

.field-label {
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.field-label .req { color: var(--accent); font-weight: 700; }

.select-wrap { position: relative; }
select.select, input.txt {
  width: 100%; appearance: none; -webkit-appearance: none;
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 40px 14px 14px;
  color: var(--text); font-family: inherit; font-size: 14px;
  outline: none; cursor: pointer; transition: all 0.15s;
}
input.txt { cursor: text; padding-right: 14px; }
select.select:focus, input.txt:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
select.select.filled { border-color: var(--accent); background: var(--accent-soft); font-weight: 600; }
select.select.filled-green {
  border-color: var(--wsp-green);
  background: rgba(37, 211, 102, 0.12);
  color: var(--text);
  font-weight: 600;
}
[data-theme="dark"] select.select.filled-green { background: rgba(37, 211, 102, 0.16); }
@media (prefers-color-scheme: dark) { [data-theme="auto"] select.select.filled-green { background: rgba(37, 211, 102, 0.16); } }
.select-wrap::after {
  content: ''; position: absolute; right: 16px; top: 50%;
  transform: translateY(-25%) rotate(45deg);
  width: 8px; height: 8px;
  border-right: 2px solid var(--text-faint); border-bottom: 2px solid var(--text-faint);
  pointer-events: none;
}

.wo-input-wrap { display: flex; gap: 8px; align-items: stretch; }
.wo-prefix {
  font-size: 14px; font-weight: 800; color: var(--accent);
  display: grid; place-items: center; padding: 0 14px;
  background: var(--accent-soft); border-radius: 10px;
}
.wo-input-wrap input.txt { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 0.03em; }

.field-sub { margin-top: 12px; }

/* Botones segmentados (emisor) */
.seg {
  display: flex; gap: 8px;
}
.seg-btn {
  flex: 1; background: var(--bg-soft); border: 1px solid var(--border);
  color: var(--text-dim); font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 16px 8px; border-radius: 11px; cursor: pointer; transition: all 0.15s;
  text-align: center; line-height: 1.3;
}
.seg-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.seg-btn .sub-txt { display: block; font-size: 10px; font-weight: 500; color: var(--text-faint); margin-top: 3px; }
.seg-btn.active .sub-txt { color: var(--accent); opacity: 0.8; }

/* ===== SUMMARY FINAL ===== */
.summary-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-bottom: 12px; box-shadow: var(--shadow);
}
.summary-head {
  background: var(--header-grad); padding: 13px 16px;
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 13px; color: white;
}
.summary-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; }
.summary-row .lbl {
  flex: 0 0 130px; padding: 13px 12px 13px 16px;
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  background: var(--bg-soft); border-right: 1px solid var(--border);
  display: flex; align-items: center;
}
.summary-row .lbl .req { color: var(--accent); margin-right: 4px; font-weight: 700; }
.summary-row .val { flex: 1; min-width: 0; padding: 11px 12px; display: flex; align-items: center; gap: 10px; }
.val-txt { flex: 1; min-width: 0; }
.val-en { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-word; }
.val-es { font-size: 11px; color: var(--text-faint); margin-top: 2px; font-style: italic; word-break: break-word; }
.val-pending { font-size: 13px; color: var(--text-faint); font-style: italic; }
.copy-btn {
  background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-dim);
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 600;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { background: var(--wsp-green); border-color: var(--wsp-green); color: white; }

/* ===== PREVIEW + ENVÍO ===== */
.msg-preview {
  background: var(--preview-bg); border: 1px solid var(--accent);
  border-radius: 12px; padding: 14px; margin-bottom: 12px;
}
.msg-preview-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--preview-label); margin-bottom: 8px;
}
.msg-preview-text { font-size: 13px; color: var(--preview-text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.send-row { display: flex; gap: 8px; }
.btn-wsp, .btn-mail {
  flex: 1; color: white; padding: 14px 12px; border-radius: 10px;
  cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s; border: none;
}
.btn-wsp { background: var(--wsp-green); }
.btn-wsp:hover { background: var(--wsp-green-dark); }
.btn-mail { background: var(--mail-blue); }
.btn-mail:hover { background: #106ebe; }

.reset-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim);
  padding: 11px 14px; border-radius: 10px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
  width: 100%; justify-content: center; margin-top: 4px;
}
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

.locked-hint {
  text-align: center; padding: 14px; color: var(--text-faint);
  font-size: 12px; font-style: italic;
}

/* ===== BÚSQUEDA ===== */
.section-title {
  font-size: 12px; font-weight: 700; color: var(--text-dim);
  margin: 18px 0 10px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.match-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 11px;
  padding: 14px; display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 8px; box-shadow: var(--shadow);
}
.match-path { font-size: 11px; color: var(--text-faint); display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.match-path .psep { color: var(--accent); font-weight: 700; }
.match-leaf { display: flex; align-items: flex-start; gap: 10px; }
.match-leaf-txt { flex: 1; min-width: 0; }
.match-en { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-word; }
.match-es { font-size: 12px; color: var(--text-faint); margin-top: 2px; font-style: italic; word-break: break-word; }
.sub-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 3px; letter-spacing: 0.05em; text-transform: uppercase; }
mark { background: var(--gold); color: #000; padding: 0 2px; border-radius: 3px; font-weight: 600; }
.btn-goto {
  background: var(--bg-soft); border: 1px solid var(--border); color: var(--accent);
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
}
.btn-goto:hover { border-color: var(--accent); }

/* ===== FAVORITOS / HISTORIAL ===== */
.fav-card, .hist-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 11px; padding: 14px; margin-bottom: 8px;
  box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
}
.fav-card { border-left: 3px solid var(--gold); }
.hist-card { border-left: 3px solid var(--wsp-green); }
.hist-meta { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.hist-wo { font-size: 16px; font-weight: 800; color: var(--accent); }
.hist-date { font-size: 11px; color: var(--text-faint); }
.fav-path, .hist-path { font-size: 11px; color: var(--text-faint); display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.fav-path .psep { color: var(--gold); font-weight: 700; }
.hist-path .psep { color: var(--wsp-green); font-weight: 700; }
.fav-en, .hist-en { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-word; }
.fav-es, .hist-es { font-size: 12px; color: var(--text-faint); margin-top: 2px; font-style: italic; word-break: break-word; }
.row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-load {
  background: var(--gold); border: none; color: #000;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
  display: inline-flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
}
.btn-rm {
  background: transparent; border: 1px solid var(--border); color: var(--text-faint);
  padding: 9px 11px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
  display: inline-flex; align-items: center;
}
.btn-rm:hover { border-color: var(--nov-red); color: var(--nov-red); }
.star-inline {
  background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px;
  width: 100%; padding: 12px; cursor: pointer; font-size: 14px; font-weight: 600;
  color: var(--text-dim); display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 12px; transition: all 0.15s;
}
.star-inline.active { background: rgba(245,185,66,0.12); border-color: var(--gold); color: var(--gold); }

.empty {
  text-align: center; padding: 50px 20px; color: var(--text-faint);
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: 14px;
}
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }
.empty-title { font-size: 14px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
.empty-sub { font-size: 12px; color: var(--text-faint); }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--text); color: var(--bg);
  padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 100; max-width: 90vw; text-align: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }

footer.bottom {
  margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--border);
  text-align: center; font-size: 11px; color: var(--text-faint);
}

@media (max-width: 480px) {
  body { font-size: 14px; }
  .app { padding: 12px; }
  .copy-btn span { display: none; }
  .copy-btn { padding: 8px; }
  .summary-row .lbl { flex: 0 0 105px; font-size: 10px; padding: 12px 8px 12px 12px; }
  .tab { font-size: 11px; }
}

// ===== TEMA =====
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (icon) {
    if (theme === 'dark') {
      icon.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
    } else if (theme === 'light') {
      icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
    } else {
      icon.innerHTML = '<circle cx="12" cy="12" r="9"/><path d="M12 3v18" /><path d="M12 3a9 9 0 0 1 0 18Z" fill="currentColor" stroke="none"/>';
    }
  }
}
function loadTheme() {
  let t = 'auto';
  try { t = localStorage.getItem(THEME_KEY) || 'auto'; } catch(e){}
  applyTheme(t);
  return t;
}
function cycleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
  try { localStorage.setItem(THEME_KEY, next); } catch(e){}
  applyTheme(next);
  showToast('Tema: ' + (next === 'auto' ? 'Automático' : next === 'light' ? 'Claro' : 'Oscuro'));
}

// ===== STORAGE =====
function loadAll() {
  try { state.favs = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e){ state.favs = []; }
  try { state.history = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e){ state.history = []; }
}
function saveFavs() { try { localStorage.setItem(FAV_KEY, JSON.stringify(state.favs)); } catch(e){} updateBadges(); }
function saveHistory() { try { localStorage.setItem(HIST_KEY, JSON.stringify(state.history)); } catch(e){} updateBadges(); }
function updateBadges() {
  const fb = document.getElementById('favBadge');
  if (fb) { if (state.favs.length) { fb.style.display=''; fb.textContent = state.favs.length; } else fb.style.display='none'; }
  const hb = document.getElementById('histBadge');
  if (hb) { if (state.history.length) { hb.style.display=''; hb.textContent = state.history.length; } else hb.style.display='none'; }
}

// ===== HELPERS =====
function normalize(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/\n/g,' '); }
function highlight(text,q){
  if(!q) return escapeHtml(text);
  const nT=normalize(text), nQ=normalize(q), idx=nT.indexOf(nQ);
  if(idx===-1) return escapeHtml(text);
  let map=[]; for(let i=0;i<text.length;i++){ const n=normalize(text[i]); for(let j=0;j<n.length;j++) map.push(i); }
  const s=map[idx], e=map[Math.min(idx+nQ.length-1,map.length-1)]+1;
  return escapeHtml(text.slice(0,s))+'<mark>'+escapeHtml(text.slice(s,e))+'</mark>'+escapeHtml(text.slice(e));
}
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1700); }
function copyText(text,btn){
  const t=(text||'').toString();
  const ok=()=>{ if(btn){ btn.classList.add('copied'); const o=btn.innerHTML; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>OK</span>'; setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=o;},1400);} showToast('Copiado'); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok).catch(()=>fbCopy(t,ok)); } else fbCopy(t,ok);
}
function fbCopy(text,cb){ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');cb();}catch(e){} document.body.removeChild(ta); }

// ===== FAVORITOS =====
function favKey(a,b,c,d){ return [a,b,c,d].join(' ▸ '); }
function isFav(a,b,c,d){ return state.favs.some(f=>f.key===favKey(a,b,c,d)); }
function toggleFav(cat,typ,code,sub){
  const k=favKey(cat.en,typ.en,code.en,sub.en);
  const i=state.favs.findIndex(f=>f.key===k);
  if(i>=0){ state.favs.splice(i,1); saveFavs(); return false; }
  state.favs.unshift({key:k,cat:{en:cat.en,es:cat.es},typ:{en:typ.en,es:typ.es},code:{en:code.en,es:code.es},sub:{en:sub.en,es:sub.es},ts:Date.now()});
  saveFavs(); return true;
}

// ===== HISTORIAL =====
function addToHistory(wo,cat,typ,code,sub){
  state.history = state.history.filter(h=>h.wo!==wo);
  state.history.unshift({wo,cat:{en:cat.en,es:cat.es},typ:{en:typ.en,es:typ.es},code:{en:code.en,es:code.es},sub:{en:sub.en,es:sub.es},ts:Date.now()});
  if(state.history.length>5) state.history=state.history.slice(0,5);
  saveHistory();
}

// ===== MENSAJES =====
function getSummary(){
  const cat = state.catIdx>=0 ? DATA[state.catIdx] : null;
  const typ = cat && state.typIdx>=0 ? cat.types[state.typIdx] : null;
  const code = typ && state.codeIdx>=0 ? typ.codes[state.codeIdx] : null;
  const sub = code && state.subIdx>=0 ? code.subs[state.subIdx] : null;
  return {cat,typ,code,sub,complete: !!(cat&&typ&&code&&sub)};
}
function buildMessage(){
  const wo=state.woNumber.trim();
  const equipo = state.equipoIdx>=0 ? PERSONAS.equipos[state.equipoIdx] : null;
  const dest=state.destinatario;
  if(!state.emisor || dest<0 || !wo || !equipo) return null;
  const {cat,typ,code,sub,complete}=getSummary();
  let msg='';
  if(state.emisor==='supervisor'){
    const tec=PERSONAS.tecnicos[dest];
    msg = 'Hola, '+tec.apellido+'.\n\n';
    msg += 'Se asignó la WO-'+wo+' correspondiente al equipo '+equipo+'.\n\n';
    msg += 'Por favor, una vez finalizada la intervención, completar la WO con la información correspondiente e informar por este medio que la misma fue cerrada.';
    if(complete){ msg+='\n\n📋 Summary recomendado:\n• Category: '+cat.en+'\n• Type: '+typ.en+'\n• Code: '+code.en+'\n• Sub: '+sub.en; }
    msg += '\n\nMuchas gracias.';
  } else {
    const sup=PERSONAS.supervisores[dest];
    msg = 'Hola, '+sup.apellido+'.\n\n';
    msg += 'Se realizó la WO-'+wo+' correspondiente al equipo '+equipo+' y la misma se encuentra completada en el sistema para su revisión y validación.';
    if(complete){ msg+='\n\n📋 Detalle:\n• Category: '+cat.en+'\n• Type: '+typ.en+'\n• Code: '+code.en+'\n• Sub: '+sub.en; }
    msg += '\n\nMuchas gracias.';
  }
  return msg;
}
function buildMailSubject(){
  const wo=state.woNumber.trim();
  const equipo = state.equipoIdx>=0 ? PERSONAS.equipos[state.equipoIdx] : '';
  if(state.emisor==='supervisor'){
    const tec = state.destinatario>=0 ? PERSONAS.tecnicos[state.destinatario] : null;
    return 'Asignación WO-'+wo+' · '+equipo+' · '+(tec?tec.apellido:'');
  }
  return 'Finalización WO-'+wo+' · '+equipo;
}
async function shareWsp(text,btn){
  if(navigator.share){ try{ await navigator.share({text}); addHistIfComplete(); }catch(err){ if(err.name!=='AbortError') copyText(text,btn); } }
  else { copyText(text,btn); setTimeout(()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'),300); addHistIfComplete(); }
}
function sendMail(text){
  const mailto='mailto:?subject='+encodeURIComponent(buildMailSubject())+'&body='+encodeURIComponent(text);
  window.location.href=mailto;
  addHistIfComplete();
}
function addHistIfComplete(){
  const {cat,typ,code,sub,complete}=getSummary();
  if(complete && state.woNumber.trim()) addToHistory(state.woNumber.trim(),cat,typ,code,sub);
}

function wireForm(){
  const woInput=document.getElementById('woInput');
  if(woInput){
    woInput.addEventListener('input',e=>{
      state._scrollY=window.scrollY;
      state.woNumber=e.target.value.replace(/\s/g,'').toUpperCase();

      renderForm();
      const inp=document.getElementById('woInput');
      if(inp){ inp.focus(); try{inp.setSelectionRange(pos,pos);}catch(err){} }
    });
  }
  document.getElementById('equipoSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.equipoIdx=parseInt(e.target.value); renderForm(); });
  document.querySelectorAll('[data-emisor]').forEach(el=>{ el.addEventListener('click',()=>{ state._scrollY=window.scrollY; state.emisor=el.dataset.emisor; state.destinatario=-1; renderForm(); }); });
  document.getElementById('destSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.destinatario=parseInt(e.target.value); renderForm(); });
  document.getElementById('catSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.catIdx=parseInt(e.target.value); state.typIdx=-1; state.codeIdx=-1; state.subIdx=-1; renderForm(); });
  document.getElementById('typSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.typIdx=parseInt(e.target.value); state.codeIdx=-1; state.subIdx=-1; renderForm(); });
  document.getElementById('codeSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.codeIdx=parseInt(e.target.value); state.subIdx=-1; renderForm(); });
  document.getElementById('subSel')?.addEventListener('change',e=>{ state._scrollY=window.scrollY; state.subIdx=parseInt(e.target.value); renderForm(); });
  document.getElementById('starBtn')?.addEventListener('click',()=>{
    const {cat,typ,code,sub}=getSummary();
    const added=toggleFav(cat,typ,code,sub);
    showToast(added?'⭐ Agregado a favoritos':'Quitado de favoritos');
    state._scrollY=window.scrollY; renderForm();
  });
  document.querySelectorAll('.copy-btn[data-copy]').forEach(el=>{ el.addEventListener('click',e=>{ e.stopPropagation(); copyText(el.dataset.copy,el); }); });
  document.getElementById('wspBtn')?.addEventListener('click',()=>{ const m=buildMessage(); if(m) shareWsp(m,document.getElementById('wspBtn')); });

  document.getElementById('resetBtn')?.addEventListener('click',()=>{
    state.woNumber=''; state.equipoIdx=-1; state.emisor=''; state.destinatario=-1;
    state.catIdx=-1; state.typIdx=-1; state.codeIdx=-1; state.subIdx=-1;
    renderForm(); window.scrollTo({top:0,behavior:'smooth'});
  });
}

// ===== BÚSQUEDA =====
function searchAll(q){
  const nQ=normalize(q); if(!nQ) return [];
  const aliasTarget=ALIASES[nQ]; const results=[];
  for(let ci=0;ci<DATA.length;ci++){
    const cat=DATA[ci]; const aliasMatch=aliasTarget&&cat.en===aliasTarget;
    for(let ti=0;ti<cat.types.length;ti++){
      const typ=cat.types[ti];
      for(let ki=0;ki<typ.codes.length;ki++){
        const code=typ.codes[ki];
        if(code.subs.length===0){
          const hay=[cat.en,cat.es,typ.en,typ.es,code.en,code.es].map(normalize).join(' | ');
          if(aliasMatch||hay.includes(nQ)) results.push({cat,typ,code,sub:null,ci,ti,ki,si:-1});
        } else {
          for(let bi=0;bi<code.subs.length;bi++){
            const sub=code.subs[bi];
            const hay=[cat.en,cat.es,typ.en,typ.es,code.en,code.es,sub.en,sub.es].map(normalize).join(' | ');
            if(aliasMatch||hay.includes(nQ)) results.push({cat,typ,code,sub,ci,ti,ki,si:bi});
          }
        }
        if(results.length>=200) return results;
      }
    }
  }
  return results;
}
function renderSearch(){
  const q=state.query.trim(); let html='';
  if(!q){ main.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Escribí cualquier término</div><div class="empty-sub">En español o inglés. Ej: "lodo", "rig up", "calibración", "WITS"</div></div>'; return; }
  const results=searchAll(q);
  if(results.length===0){ main.innerHTML='<div class="empty"><div class="empty-icon">∅</div><div class="empty-title">Sin coincidencias</div><div class="empty-sub">No se encontró "'+escapeHtml(q)+'"</div></div>'; return; }
  html+='<div class="section-title">'+results.length+(results.length>=200?'+ ':' ')+(results.length===1?'resultado':'resultados')+'</div>';
  for(const r of results){
    const leafEn=r.sub?r.sub.en:r.code.en, leafEs=r.sub?r.sub.es:r.code.es, leafLbl=r.sub?'Subcódigo':'Código';
    html+='<div class="match-card"><div class="match-path"><span>'+highlight(r.cat.en,q)+' · '+highlight(r.cat.es,q)+'</span><span class="psep">›</span><span>'+highlight(r.typ.en,q)+'</span>';
    if(r.sub) html+='<span class="psep">›</span><span>'+highlight(r.code.en,q)+'</span>';
    html+='</div><div class="match-leaf"><div class="match-leaf-txt"><div class="sub-label">'+leafLbl+'</div><div class="match-en">'+highlight(leafEn,q)+'</div><div class="match-es">'+highlight(leafEs,q)+'</div></div><button class="copy-btn" data-copy="'+escapeAttr(leafEn)+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg><span>Copiar</span></button></div>';
    html+='<button class="btn-goto" data-go="'+r.ci+','+r.ti+','+r.ki+','+r.si+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Cargar en formulario</button>';
    html+='</div>';
  }
  main.innerHTML=html;
  main.querySelectorAll('.copy-btn[data-copy]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();copyText(el.dataset.copy,el);}));
  main.querySelectorAll('.btn-goto').forEach(el=>{ el.addEventListener('click',()=>{ const[ci,ti,ki,si]=el.dataset.go.split(',').map(Number); state.catIdx=ci;state.typIdx=ti;state.codeIdx=ki;state.subIdx=si; state.query='';searchInput.value='';searchInput.classList.remove('has-value'); setMode('form'); window.scrollTo({top:0,behavior:'smooth'}); }); });
}

// ===== FAVORITOS =====
function findIndices(catEn,typEn,codeEn,subEn){
  for(let ci=0;ci<DATA.length;ci++){ if(DATA[ci].en!==catEn)continue;
    for(let ti=0;ti<DATA[ci].types.length;ti++){ if(DATA[ci].types[ti].en!==typEn)continue;
      for(let ki=0;ki<DATA[ci].types[ti].codes.length;ki++){ if(DATA[ci].types[ti].codes[ki].en!==codeEn)continue;
        for(let si=0;si<DATA[ci].types[ti].codes[ki].subs.length;si++){ if(DATA[ci].types[ti].codes[ki].subs[si].en===subEn) return{ci,ti,ki,si}; }
      }
    }
  }
  return null;
}
function renderFavs(){
  let html='';
  if(state.favs.length===0){ main.innerHTML='<div class="empty"><div class="empty-icon">⭐</div><div class="empty-title">Sin favoritos todavía</div><div class="empty-sub">Tocá ☆ en el Summary para guardar un subcódigo.</div></div>'; return; }
  html+='<div class="section-title">'+state.favs.length+(state.favs.length===1?' favorito':' favoritos')+'</div>';
  state.favs.forEach((f,idx)=>{
    html+='<div class="fav-card"><div class="fav-path"><span>'+escapeHtml(f.cat.en)+'</span><span class="psep">›</span><span>'+escapeHtml(f.typ.en)+'</span><span class="psep">›</span><span>'+escapeHtml(f.code.en)+'</span></div>';
    html+='<div><div class="sub-label">Subcódigo</div><div class="fav-en">'+escapeHtml(f.sub.en)+'</div><div class="fav-es">'+escapeHtml(f.sub.es)+'</div></div>';
    html+='<div class="row-actions"><button class="btn-load" data-load="'+idx+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Cargar</button>';
    html+='<button class="copy-btn" data-copy="'+escapeAttr(f.sub.en)+'" style="flex:1;justify-content:center"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg><span>Copiar</span></button>';
    html+='<button class="btn-rm" data-rm="'+idx+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div>';
  });
  main.innerHTML=html;
  main.querySelectorAll('[data-load]').forEach(el=>{ el.addEventListener('click',()=>{ const f=state.favs[parseInt(el.dataset.load)]; const ix=findIndices(f.cat.en,f.typ.en,f.code.en,f.sub.en); if(!ix){showToast('No encontrado');return;} state.catIdx=ix.ci;state.typIdx=ix.ti;state.codeIdx=ix.ki;state.subIdx=ix.si; setMode('form'); window.scrollTo({top:0,behavior:'smooth'}); }); });
  main.querySelectorAll('[data-rm]').forEach(el=>{ el.addEventListener('click',()=>{ state.favs.splice(parseInt(el.dataset.rm),1); saveFavs(); renderFavs(); showToast('Favorito eliminado'); }); });
  main.querySelectorAll('.copy-btn[data-copy]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();copyText(el.dataset.copy,el);}));
}

// ===== HISTORIAL =====
function fmtDate(ts){ const d=new Date(ts),p=n=>String(n).padStart(2,'0'); return p(d.getDate())+'/'+p(d.getMonth()+1)+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function renderHistory(){
  let html='';
  if(state.history.length===0){ main.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Sin historial todavía</div><div class="empty-sub">Cuando envíes un aviso de WO completada, se guarda acá (últimas 5).</div></div>'; return; }
  html+='<div class="section-title">Últimas '+state.history.length+' WO</div>';
  state.history.forEach((h,idx)=>{
    html+='<div class="hist-card"><div class="hist-meta"><div class="hist-wo">WO-'+escapeHtml(h.wo)+'</div><div class="hist-date">'+fmtDate(h.ts)+'</div></div>';
    html+='<div class="hist-path"><span>'+escapeHtml(h.cat.en)+'</span><span class="psep">›</span><span>'+escapeHtml(h.typ.en)+'</span><span class="psep">›</span><span>'+escapeHtml(h.code.en)+'</span></div>';
    html+='<div><div class="sub-label">Subcódigo</div><div class="hist-en">'+escapeHtml(h.sub.en)+'</div><div class="hist-es">'+escapeHtml(h.sub.es)+'</div></div>';
    html+='<div class="row-actions"><button class="btn-load" data-load="'+idx+'"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Cargar</button>';
    html+='<button class="btn-rm" data-rm="'+idx+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div>';
  });
  main.innerHTML=html;
  main.querySelectorAll('[data-load]').forEach(el=>{ el.addEventListener('click',()=>{ const h=state.history[parseInt(el.dataset.load)]; const ix=findIndices(h.cat.en,h.typ.en,h.code.en,h.sub.en); if(!ix){showToast('No encontrado');return;} state.catIdx=ix.ci;state.typIdx=ix.ti;state.codeIdx=ix.ki;state.subIdx=ix.si; state.woNumber=h.wo; setMode('form'); window.scrollTo({top:0,behavior:'smooth'}); }); });
  main.querySelectorAll('[data-rm]').forEach(el=>{ el.addEventListener('click',()=>{ state.history.splice(parseInt(el.dataset.rm),1); saveHistory(); renderHistory(); showToast('Eliminado'); }); });
}

// ===== NAVEGACIÓN =====
function setMode(m){
  state.mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  if(m==='form') renderForm();
  else if(m==='search') renderSearch();
  else if(m==='favs') renderFavs();
  else if(m==='history') renderHistory();
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>setMode(t.dataset.mode)));
searchInput.addEventListener('input',e=>{ state.query=e.target.value; searchInput.classList.toggle('has-value',!!state.query); if(state.query){ if(state.mode!=='search') setMode('search'); else renderSearch(); } else if(state.mode==='search') renderSearch(); });
clearBtn.addEventListener('click',()=>{ searchInput.value='';state.query='';searchInput.classList.remove('has-value');searchInput.focus(); if(state.mode==='search') renderSearch(); });
document.getElementById('themeToggle').addEventListener('click',cycleTheme);

// ===== INIT =====
loadTheme();
loadAll();
updateBadges();
renderForm();
</script>
